<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; width: 260px; padding: 20px; margin: 0; background: #ffffff; }
        h3 { margin-top: 0; font-size: 16px; color: #1e293b; text-align: center; }
        p { font-size: 12px; color: #64748b; text-align: center; line-height: 1.5; margin-bottom: 20px; word-break: keep-all; }
        button { 
            width: 100%; padding: 12px; background: #ef4444; color: white; border: none; 
            border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s ease; 
        }
        button:hover { background: #dc2626; box-shadow: 0 2px 8px rgba(220, 38, 38, 0.4); }
        button:active { transform: scale(0.98); }
        button:disabled { background: #94a3b8; cursor: not-allowed; box-shadow: none; }
        .success { color: #10b981; font-weight: bold; text-align: center; display: none; margin-top: 12px; font-size: 14px;}
        .icon { font-size: 32px; text-align: center; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="icon">🗄️</div>
    <h3>보안 캐시 DB 초기화</h3>
    <p>백엔드 로컬에 저장된 모든 호버링 추론 캐시 데이터(SQLite)를 강제로 삭제하여 초기화합니다.</p>
    <button id="clearBtn">데이터베이스(DB) 초기화</button>
    <div id="statusMsg" class="success">초기화 완료! ✔️</div>
    <script src="popup.js"></script>
</body>
</html>
