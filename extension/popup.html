<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; width: 260px; padding: 20px; margin: 0; background: #ffffff; }
        h3 { margin-top: 0; font-size: 16px; color: #1e293b; text-align: center; }
        p { font-size: 12px; color: #64748b; text-align: center; line-height: 1.5; margin-bottom: 20px; word-break: keep-all; }
        button { 
            width: 100%; padding: 12px; background: #ef4444; color: white; border: none; 
            border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s ease; 
        }
        button:hover { background: #dc2626; box-shadow: 0 2px 8px rgba(220, 38, 38, 0.4); }
        button:active { transform: scale(0.98); }
        button:disabled { background: #94a3b8; cursor: not-allowed; box-shadow: none; }
        .success { color: #10b981; font-weight: bold; text-align: center; display: none; margin-top: 12px; font-size: 14px;}
        .icon { font-size: 32px; text-align: center; margin-bottom: 10px; }
        .toggle-container { display: flex; align-items: center; justify-content: space-between; background: #f8fafc; padding: 12px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #e2e8f0; }
        .toggle-label { font-size: 13px; font-weight: 600; color: #334155; }
        .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #cbd5e1; transition: .3s; border-radius: 24px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .3s; border-radius: 50%; }
        input:checked + .slider { background-color: #3b82f6; }
        input:checked + .slider:before { transform: translateX(20px); }
    </style>
</head>
<body>
    <div class="icon">🗄️</div>
    <h3>보안 캐시 DB 초기화</h3>
    <p>백엔드 로컬에 저장된 모든 호버링 추론 캐시 데이터(SQLite)를 강제로 삭제하여 초기화합니다.</p>
    
    <div class="toggle-container">
        <span class="toggle-label">진행사항 툴팁 실시간 표시</span>
        <label class="switch">
            <input type="checkbox" id="progressToggle" checked>
            <span class="slider"></span>
        </label>
    </div>

    <button id="clearBtn">데이터베이스(DB) 초기화</button>
    <div id="statusMsg" class="success">초기화 완료! ✔️</div>
    <script src="popup.js"></script>
</body>
</html>
