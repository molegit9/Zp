<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Safety Net Options</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      width: 220px;
      padding: 16px;
      margin: 0;
      color: #333;
    }
    h3 {
      font-size: 15px;
      margin-top: 0;
      margin-bottom: 12px;
      text-align: center;
    }
    button {
      width: 100%;
      padding: 10px;
      background-color: #ff3b30;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      font-size: 13px;
      transition: background-color 0.2s;
    }
    button:hover {
      background-color: #d12a20;
    }
    #status {
      margin-top: 12px;
      font-size: 12px;
      text-align: center;
      font-weight: bold;
      min-height: 16px;
    }
    
    @media (prefers-color-scheme: dark) {
      body { background-color: #1e1e1e; color: #fff; }
    }
  </style>
</head>
<body>
  <h3>🛡️ Safety Net 설정</h3>
  <button id="clearBtn">🗑️ DB 기록 캐시 초기화</button>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
